# Fedora AArch64 (QEMU UEFI only) — NOT Raspberry Pi hardware / NOT Raspberry Pi OS.
# Loaded with --profile aarch64 (see appliance/scripts/build-image.sh).
[Distribution]
Architecture=arm64

[Output]
Output=trs-ai-basic-m1-aarch64

[Runtime]
# Fedora's aarch64 kernel package ships as EFI zboot (often zstd-compressed). QEMU's -kernel direct
# boot (Firmware=linux) cannot load that format — you get "unable to handle EFI zboot image with zstd".
# UEFI boots from the image ESP via edk2-aarch64 (AAVMF), same class of path as Raspberry Pi UEFI.
Firmware=uefi
