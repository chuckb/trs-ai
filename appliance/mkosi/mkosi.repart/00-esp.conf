# Must copy boot assets onto the ESP vfat. Without CopyFiles, systemd-repart creates an empty ESP
# while the root partition holds CopyFiles=/ only — UEFI (and AArch64 `Firmware=uefi` / Pi) then has
# nothing to boot. Matches mkosi’s built-in repart defaults when mkosi.repart/ is not overridden.
#
# Pi note: mkosi.conf [Build] Environment= sets SYSTEMD_REPART_MKFS_OPTIONS_VFAT=-S 512 so mkfs.vfat does not use
# 4096-byte logical sectors (default on some paths). Pi firmware mis-reads that BPB → FAT errors.
[Partition]
Type=esp
Format=vfat
CopyFiles=/boot:/
CopyFiles=/efi:/
SizeMinBytes=512M
