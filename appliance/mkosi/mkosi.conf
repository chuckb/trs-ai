# TRS-AI Milestone 1: bootable Fedora appliance → MBASIC CLI on tty / serial / virtio console (hvc0).
# Build from repo root: ./appliance/scripts/build-image.sh
# Prefer: ./appliance/scripts/build-image.sh (sets workspace/cache/output on one filesystem).

[Config]
MinimumVersion=22

[Distribution]
Distribution=fedora
Release=42
# Default appliance arch is x86_64 (use --profile aarch64 for AArch64 / Raspberry Pi class images).
Architecture=x86-64

[Output]
Format=disk
CompressOutput=no
Output=trs-ai-basic-m1

[Content]
Bootable=yes
Hostname=trs-ai-basic

Packages=
    bash
    ca-certificates
    coreutils
    fedora-release
    glibc-langpack-en
    iproute
    iputils
    kernel
    polkit
    python3
    shadow-utils
    systemd
    systemd-boot-unsigned
    systemd-networkd
    systemd-resolved
    systemd-udev
    tpm2-tss
    util-linux

WithDocs=no

[Build]
BuildSources=../../mbasic:mbasic
BuildSources=./build-assets:trs-ai-assets
BuildSources=./build-secrets:trs-ai-secrets
WithNetwork=yes
# mkosi does not forward arbitrary host env vars to systemd-repart; only [Build] Environment= is passed
# (see mkosi run.py). Without this, mkfs.vfat may use 4096-byte logical sectors and Raspberry Pi firmware
# fails to read the ESP even though Linux mounts it fine.
# Keep in sync with repart-vfat-options.env (reference for systemd-repart vfat options).
Environment="SYSTEMD_REPART_MKFS_OPTIONS_VFAT=-S 512"

[Runtime]
# For Format=disk, mkosi's default (auto → UEFI) boots only from the image ESP. That often breaks with
# OVMF NVRAM / PCI paths (e.g. BdsDxe: Boot0002 "UEFI Misc Device" … Not Found). Direct Linux boot uses the
# split trs-ai-basic-m1.vmlinuz + .initrd next to the .raw and passes root= from the GPT layout.
Firmware=linux
# Explicit: QEMU user/slirp NIC (virtio). Guest needs this for DHCP + DNS; appliance/scripts/run-vm.sh passes the same.
RuntimeNetwork=user
# Belt-and-suspenders with mkosi vm: pull networkd even if presets stripped [Install] symlinks (see postinst drop-in).
KernelCommandLineExtra=systemd.wants=systemd-networkd.socket systemd.wants=systemd-networkd.service
