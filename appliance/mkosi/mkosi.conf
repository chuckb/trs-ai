# TRS-AI Milestone 1: bootable Fedora appliance → MBASIC CLI on tty / serial / virtio console (hvc0).
# Build from repo root: ./appliance/scripts/build-image.sh
# Prefer: ./appliance/scripts/build-image.sh (sets workspace/cache/output on one filesystem).

[Config]
MinimumVersion=22

[Distribution]
Distribution=fedora
Release=42

[Output]
Format=disk
CompressOutput=no
Output=trs-ai-basic-m1

[Content]
Bootable=yes
Hostname=trs-ai-basic

Packages=
    bash
    coreutils
    fedora-release
    glibc-langpack-en
    iproute
    iputils
    kernel
    polkit
    python3
    shadow-utils
    systemd
    systemd-boot-unsigned
    systemd-udev
    tpm2-tss
    util-linux

WithDocs=no

[Build]
BuildSources=../../mbasic:mbasic
WithNetwork=yes

[Runtime]
# For Format=disk, mkosi's default (auto → UEFI) boots only from the image ESP. That often breaks with
# OVMF NVRAM / PCI paths (e.g. BdsDxe: Boot0002 "UEFI Misc Device" … Not Found). Direct Linux boot uses the
# split trs-ai-basic-m1.vmlinuz + .initrd next to the .raw and passes root= from the GPT layout.
Firmware=linux
